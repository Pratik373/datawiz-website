<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — DataWiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F8F7F4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: white;
            border: 1px solid #E0DDD8;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { color: #1A1A18; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #5A5A58; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        a {
            display: inline-block;
            background: #4A7C59;
            color: white;
            padding: 0.8rem 2rem;
            text-decoration: none;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
    <script>
        // Auto-redirect to /tests after 3 seconds
        setTimeout(function() { window.location.href = '/tests'; }, 3000);
    </script>
</head>
<body>
    <div class="card">
        <div class="icon">🔥</div>
        <h1>Payment Successful!</h1>
        <p>Your Pro Pack is now active. All premium C-CAT mock tests are unlocked and ready for you. Best of luck!</p>
        <a href="/tests">Go to My Tests →</a>
        <p style="margin-top:1rem; font-size:0.8rem; color:#9A9A98;">Redirecting automatically in 3 seconds…</p>
    </div>
</body>
</html>
